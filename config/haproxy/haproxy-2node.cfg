# HAProxy Configuration for Neo4j HA — 2-node (1 Primary + 1 Standby)
#
# 对应 docker/neo4j/deploy-test.yml 的 2 节点测试环境部署。
# 3 节点版本参见同目录 haproxy.cfg。
#
# 健康检查方式：TCP 直连 Neo4j Bolt 端口（无需 HA Agent sidecar）。
# Failover 路由切换：HA Agent 通过 admin socket (Runtime API) 动态控制。
# HAProxy 自身不感知主备角色，由 HA Agent 通过命令切换 server state。

global
    log stdout format raw local0
    maxconn 4096
    stats socket /var/run/haproxy/admin.sock mode 660 level admin expose-fd listeners

resolvers docker_dns
    nameserver dns1 127.0.0.11:53
    resolve_retries 3
    timeout resolve 1s
    timeout retry   1s
    hold valid      10s
    hold nx         5s

defaults
    log global
    mode tcp
    option tcplog
    timeout connect 5s
    timeout client 30m
    timeout server 30m
    retries 3
    default-server init-addr last,libc,none resolvers docker_dns

# ============================================================
# Write traffic -> Primary only
# HA Agent 通过 admin socket 控制哪个 server 为 ready/maint
# ============================================================
frontend neo4j_write
    bind *:7687
    default_backend neo4j_primary

backend neo4j_primary
    option tcp-check
    server neo4j-primary neo4j-primary:7687 check inter 2s fall 3 rise 2
    server neo4j-standby-1 neo4j-standby-1:7687 check inter 2s fall 3 rise 2 backup disabled

# ============================================================
# Read traffic -> All ONLINE nodes (round-robin)
# 备节点初始状态为 maint，由 HA Agent 在数据同步完成后
# 通过 admin socket 发送 "set server neo4j_all/neo4j-standby-1 state ready" 上线。
# ============================================================
frontend neo4j_read
    bind *:7688
    default_backend neo4j_all

backend neo4j_all
    balance roundrobin
    option tcp-check
    server neo4j-primary neo4j-primary:7687 check inter 2s fall 3 rise 2
    server neo4j-standby-1 neo4j-standby-1:7687 check inter 2s fall 3 rise 2 disabled

# ============================================================
# Stats dashboard: http://<host>:8404/stats
# ============================================================
frontend stats
    bind *:8404
    mode http
    stats enable
    stats uri /stats
    stats refresh 5s

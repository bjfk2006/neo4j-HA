# Neo4j HA - 测试环境部署 Compose
#
# 直接使用已打包镜像启动完整集群（2节点 Neo4j + 2 HAProxy + HA Agent）。
# 数据目录与配置文件均使用宿主机绝对路径 bind-mount。
#
# 宿主机目录约定（启动前需手动创建）:
#   /opt/neo4j-1/{data,logs,import,plugins}
#   /opt/neo4j-2/{data,logs,import,plugins}
#   /opt/haproxy-1/{haproxy.cfg,socket}
#   /opt/haproxy-2/{haproxy.cfg,socket}
#   /opt/ha-agent/{ha-agent.yml,buffer}
#
# 前置条件:
#   1. 在 docker/ 目录下复制并填写 .env: cp .env.example .env
#   2. 将 config/haproxy/haproxy-2node.cfg  → /opt/haproxy-1/haproxy.cfg
#                                            → /opt/haproxy-2/haproxy.cfg
#      将 config/agent/ha-agent-2node.yml   → /opt/ha-agent/ha-agent.yml
#   3. 拉取或构建 HA Agent 镜像，设置 HA_AGENT_IMAGE 指向该镜像 tag
#
# 启动: docker compose -f docker/neo4j/deploy-test.yml --env-file docker/.env up -d
# 停止: docker compose -f docker/neo4j/deploy-test.yml --env-file docker/.env down
# 查看: docker compose -f docker/neo4j/deploy-test.yml --env-file docker/.env ps

services:

  # ========== Neo4j Primary ==========
  neo4j-primary:
    image: neo4j:5.26-community
    container_name: neo4j-primary
    restart: unless-stopped
    ports:
      - "7474:7474"   # HTTP UI
      - "7687:7687"   # Bolt
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD}
      NEO4J_dbms_security_auth__max__failed__attempts: "0"
      NEO4J_server_memory_heap_initial__size: ${NEO4J_HEAP:-2G}
      NEO4J_server_memory_heap_max__size: ${NEO4J_HEAP:-2G}
      NEO4J_server_memory_pagecache_size: ${NEO4J_PAGECACHE:-1G}
      NEO4J_PLUGINS: '["apoc", "graph-data-science"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*,gds.*"
      NEO4J_dbms_security_procedures_allowlist: "apoc.*,gds.*"
      NEO4J_apoc_trigger_enabled: "true"
      NEO4J_apoc_trigger_refresh: "1000"
      NEO4J_apoc_export_file_enabled: "true"
      NEO4J_apoc_import_file_enabled: "true"
      NEO4J_db_tx__log_rotation_retention__policy: "7 days"
      TZ: ${TZ:-Asia/Singapore}
    volumes:
      - /opt/neo4j-1/data:/data
      - /opt/neo4j-1/logs:/logs
      - /opt/neo4j-1/import:/import
      - /opt/neo4j-1/plugins:/plugins
    networks:
      - neo4j-ha
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "${NEO4J_PASSWORD}", "RETURN 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ========== Neo4j Standby-1 ==========
  neo4j-standby-1:
    image: neo4j:5.26-community
    container_name: neo4j-standby-1
    restart: unless-stopped
    ports:
      - "7475:7474"   # HTTP UI (offset +1)
      - "7688:7687"   # Bolt (offset +1)
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD}
      NEO4J_dbms_security_auth__max__failed__attempts: "0"
      NEO4J_server_memory_heap_initial__size: ${NEO4J_HEAP:-2G}
      NEO4J_server_memory_heap_max__size: ${NEO4J_HEAP:-2G}
      NEO4J_server_memory_pagecache_size: ${NEO4J_PAGECACHE:-1G}
      NEO4J_PLUGINS: '["apoc", "graph-data-science"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*,gds.*"
      NEO4J_dbms_security_procedures_allowlist: "apoc.*,gds.*"
      NEO4J_apoc_trigger_enabled: "true"
      NEO4J_apoc_trigger_refresh: "1000"
      NEO4J_apoc_export_file_enabled: "true"
      NEO4J_apoc_import_file_enabled: "true"
      NEO4J_db_tx__log_rotation_retention__policy: "7 days"
      TZ: ${TZ:-Asia/Singapore}
    volumes:
      - /opt/neo4j-2/data:/data
      - /opt/neo4j-2/logs:/logs
      - /opt/neo4j-2/import:/import:ro
      - /opt/neo4j-2/plugins:/plugins
    networks:
      - neo4j-ha
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "${NEO4J_PASSWORD}", "RETURN 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ========== HAProxy-1 (Write/Read VIP 实例 1) ==========
  haproxy-1:
    image: haproxy:3.2.9
    container_name: haproxy-1
    restart: "on-failure:5"
    user: "0:0"
    ports:
      - "17687:7687"   # Write VIP
      - "17688:7688"   # Read VIP
      - "8404:8404"    # Stats
    volumes:
      - /opt/haproxy-1/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
      - /opt/haproxy-1/socket:/var/run/haproxy
    networks:
      - neo4j-ha
    depends_on:
      neo4j-primary:
        condition: service_healthy

  # ========== HAProxy-2 (Write/Read VIP 实例 2) ==========
  haproxy-2:
    image: haproxy:3.2.9
    container_name: haproxy-2
    restart: "on-failure:5"
    user: "0:0"
    ports:
      - "27687:7687"   # Write VIP (offset)
      - "27688:7688"   # Read VIP (offset)
      - "8405:8404"    # Stats (offset)
    volumes:
      - /opt/haproxy-2/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
      - /opt/haproxy-2/socket:/var/run/haproxy
    networks:
      - neo4j-ha
    depends_on:
      neo4j-primary:
        condition: service_healthy

  # ========== HA Agent ==========
  ha-agent:
    image: ${HA_AGENT_IMAGE:-neo4j-ha-agent:1.0.0-SNAPSHOT}
    container_name: ha-agent
    restart: unless-stopped
    working_dir: /app
    command: >
      java -Xms512m -Xmx1g -XX:+UseG1GC -XX:MaxGCPauseMillis=200
      -cp "/app/ha-agent.jar:/app/lib/*"
      com.neo4j.ha.agent.HaAgent /app/config/ha-agent.yml
    environment:
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      REDIS_HOST: ${REDIS_HOST:-172.19.0.11}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      ADMIN_TOKEN: ${ADMIN_TOKEN}
      TZ: ${TZ:-Asia/Singapore}
    ports:
      - "18888:8080"   # Admin API + Health
      - "19999:9090"   # Prometheus metrics
    volumes:
      - /opt/ha-agent/ha-agent.yml:/app/config/ha-agent.yml:ro
      - /opt/haproxy-1/socket:/var/run/haproxy-1
      - /opt/haproxy-2/socket:/var/run/haproxy-2
      - /opt/ha-agent/buffer:/var/lib/neo4j-ha/buffer
    networks:
      - neo4j-ha
    depends_on:
      neo4j-primary:
        condition: service_healthy

networks:
  neo4j-ha:
    driver: bridge
